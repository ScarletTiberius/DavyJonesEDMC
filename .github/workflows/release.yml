name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |          
          mkdir -p dist/build/DavyJones
          
          rsync -av \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='__pycache__' \
          --exclude='dist' \
          --exclude='*.pyc' \
          --exclude='.venv' \
          --exclude='venv' \
          --exclude='.pytest_cache' \
          --exclude='.mypy_cache' \
          ./ dist/build/DavyJones/
          
          # Zip from the build directory
          cd dist/build
          zip -r ../DavyJones-${{ github.ref_name }}.zip DavyJones/

      - name: Verify archive
        run: |
          ls -lah dist
          unzip -l dist/DavyJones-${{ github.ref_name }}.zip | head -50

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/DavyJones-${{ github.ref_name }}.zip
